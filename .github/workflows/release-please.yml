name: Release please

# Opens / updates the "chore: release X.Y.Z" PR (CHANGELOG + manifest.json).
# Manual merge → tag vX.Y.Z + GitHub Release (changelog + enki.zip) via softprops.
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      body: ${{ steps.release.outputs.body }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-release:
    name: publish-release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Build HACS zip
        shell: bash
        run: |
          cd "${{ github.workspace }}/custom_components/enki"
          zip -r enki.zip .

      - name: Prepare release notes
        env:
          CHANGELOG_BODY: ${{ needs.release-please.outputs.body }}
        run: |
          printf '%s\n\n## Install\n\nHACS → Enki → Update, then restart Home Assistant.\n' \
            "$CHANGELOG_BODY" > release-notes.md

      - name: Create GitHub Release with enki.zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          name: ${{ needs.release-please.outputs.tag_name }}
          body_path: release-notes.md
          files: ${{ github.workspace }}/custom_components/enki/enki.zip
