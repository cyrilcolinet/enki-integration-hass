name: Release please

# Opens / updates the "chore: release X.Y.Z" PR (CHANGELOG + manifest.json).
# Manual merge → tag vX.Y.Z + GitHub Release (release-please) + enki.zip + install note.
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release

  publish-release:
    name: publish-release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Build HACS zip
        run: |
          cd "${{ github.workspace }}/custom_components/enki"
          zip -r enki.zip .

      - name: Upload enki.zip and append install note
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ github.workspace }}/custom_components/enki/enki.zip
          append_body: true
          body: |
            ## Install

            HACS → Enki → Update, then restart Home Assistant.
