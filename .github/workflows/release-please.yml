name: Release please

# Opens / updates the "chore: release X.Y.Z" PR (CHANGELOG + manifest.json).
# Manual merge → tag vX.Y.Z + GitHub Release + enki.zip (same workflow, GITHUB_TOKEN).
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  attach-hacs-zip:
    name: attach-hacs-zip
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Build HACS zip
        shell: bash
        run: |
          cd "${{ github.workspace }}/custom_components/enki"
          zip -r enki.zip .

      - name: Upload enki.zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: ${{ github.workspace }}/custom_components/enki/enki.zip
          overwrite_files: true

      - name: Append HACS install note to release body
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.release-please.outputs.tag_name }}';
            const installBlock =
              '\n\n## Install\n\nHACS → Enki → Update, then restart Home Assistant.';
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });
            if (release.body?.includes('## Install')) {
              core.info('Install section already present');
              return;
            }
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              body: `${release.body ?? ''}${installBlock}`,
            });
